<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Caption Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Image Caption Generator</h1>
        <p>Upload an image and the AI will describe what's in it.</p>
        
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <label for="imageInput" class="upload-btn">Select Image</label>
        </div>

        <div class="preview-section" id="previewContainer" style="display: none;">
            <img id="imagePreview" src="" alt="Image Preview">
            <div class="loader" id="loader" style="display: none;">Generating caption...</div>
            <div id="captionResult" class="caption-result"></div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
